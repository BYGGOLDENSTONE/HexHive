<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 440" width="780" height="440">
  <defs>
    <linearGradient id="cliff-r" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a08558"/>
      <stop offset="100%" stop-color="#6a5535"/>
    </linearGradient>
    <linearGradient id="cliff-l" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7a6545"/>
      <stop offset="100%" stop-color="#4a3825"/>
    </linearGradient>
    <linearGradient id="ramp-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5eaa4f"/>
      <stop offset="50%" stop-color="#4a8a3e"/>
      <stop offset="100%" stop-color="#3a6432"/>
    </linearGradient>
    <linearGradient id="shadow-g" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#000" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="tower-glow">
      <stop offset="0%" stop-color="#ffcc33" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ffcc33" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="range-fill" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#ffdd55" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffdd55" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ====== BACKGROUND ====== -->
  <rect width="780" height="440" fill="#111a0d"/>

  <!-- Faint bg hex pattern -->
  <g opacity="0.03" stroke="#88aa66" stroke-width="0.5" fill="none">
    <polygon points="50,30 74,38 74,54 50,62 26,54 26,38"/>
    <polygon points="122,30 146,38 146,54 122,62 98,54 98,38"/>
    <polygon points="600,18 624,26 624,42 600,50 576,42 576,26"/>
    <polygon points="50,360 74,368 74,384 50,392 26,384 26,368"/>
    <polygon points="670,360 694,368 694,384 670,392 646,384 646,368"/>
  </g>

  <!-- ====== CLIFF SHADOW on low ground ====== -->
  <rect x="178" y="136" width="300" height="28" fill="url(#shadow-g)"/>

  <!-- ====== LOW GROUND HEXES ====== -->
  <!-- Isometric hex: hw=36, hh=16. Points: cx,cy-16 cx+36,cy-8 cx+36,cy+8 cx,cy+16 cx-36,cy+8 cx-36,cy-8 -->
  <g id="low-ground">
    <!-- Row 3 (y=152, staggered) -->
    <polygon points="256,136 292,144 292,160 256,168 220,160 220,144" fill="#3a6432" stroke="#2b4d25" stroke-width="1.5"/>
    <polygon points="400,136 436,144 436,160 400,168 364,160 364,144" fill="#3d6835" stroke="#2b4d25" stroke-width="1.5"/>
    <!-- Row 4 (y=176) -->
    <polygon points="220,160 256,168 256,184 220,192 184,184 184,168" fill="#3d6835" stroke="#2b4d25" stroke-width="1.5"/>
    <polygon points="292,160 328,168 328,184 292,192 256,184 256,168" fill="#3a6432" stroke="#2b4d25" stroke-width="1.5"/>
    <polygon points="364,160 400,168 400,184 364,192 328,184 328,168" fill="#3d6835" stroke="#2b4d25" stroke-width="1.5"/>
    <polygon points="436,160 472,168 472,184 436,192 400,184 400,168" fill="#3a6432" stroke="#2b4d25" stroke-width="1.5"/>
    <!-- Row 5 (y=200, staggered) -->
    <polygon points="256,184 292,192 292,208 256,216 220,208 220,192" fill="#3a6432" stroke="#2b4d25" stroke-width="1.5"/>
    <polygon points="328,184 364,192 364,208 328,216 292,208 292,192" fill="#3d6835" stroke="#2b4d25" stroke-width="1.5"/>
    <polygon points="400,184 436,192 436,208 400,216 364,208 364,192" fill="#3a6432" stroke="#2b4d25" stroke-width="1.5"/>
    <!-- Row 6 (y=224) -->
    <polygon points="220,208 256,216 256,232 220,240 184,232 184,216" fill="#3d6835" stroke="#2b4d25" stroke-width="1.5"/>
    <polygon points="292,208 328,216 328,232 292,240 256,232 256,216" fill="#3a6432" stroke="#2b4d25" stroke-width="1.5"/>
    <polygon points="364,208 400,216 400,232 364,240 328,232 328,216" fill="#3d6835" stroke="#2b4d25" stroke-width="1.5"/>
    <polygon points="436,208 472,216 472,232 436,240 400,232 400,216" fill="#3a6432" stroke="#2b4d25" stroke-width="1.5"/>
    <!-- Row 7 (y=248, staggered) -->
    <polygon points="256,232 292,240 292,256 256,264 220,256 220,240" fill="#3a6432" stroke="#2b4d25" stroke-width="1.5"/>
    <polygon points="328,232 364,240 364,256 328,264 292,256 292,240" fill="#3d6835" stroke="#2b4d25" stroke-width="1.5"/>
    <polygon points="400,232 436,240 436,256 400,264 364,256 364,240" fill="#3a6432" stroke="#2b4d25" stroke-width="1.5"/>
  </g>
  <!-- Low ground grass tufts -->
  <g stroke="#4a7a42" stroke-width="0.8" stroke-linecap="round" opacity="0.45">
    <line x1="250" y1="155" x2="253" y2="150"/><line x1="260" y1="157" x2="263" y2="152"/>
    <line x1="288" y1="175" x2="291" y2="170"/><line x1="360" y1="178" x2="363" y2="173"/>
    <line x1="432" y1="175" x2="435" y2="170"/><line x1="325" y1="200" x2="328" y2="195"/>
    <line x1="252" y1="200" x2="255" y2="195"/><line x1="395" y1="202" x2="398" y2="197"/>
  </g>

  <!-- ====== CLIFF SIDE FACES ====== -->
  <!-- LEFT cliff section: below H7 + H8 (x=184 to x=328) -->
  <!-- Right-lit faces (brighter) -->
  <polygon points="256,81 220,89 220,144 256,136" fill="url(#cliff-r)"/>
  <polygon points="328,81 292,89 292,144 328,136" fill="url(#cliff-r)"/>
  <!-- Left-lit faces (darker) -->
  <polygon points="220,89 184,81 184,136 220,144" fill="url(#cliff-l)"/>
  <polygon points="292,89 256,81 256,136 292,144" fill="url(#cliff-l)"/>

  <!-- RIGHT cliff section: below H10 (x=400 to x=472) -->
  <polygon points="472,81 436,89 436,144 472,136" fill="url(#cliff-r)"/>
  <polygon points="436,89 400,81 400,136 436,144" fill="url(#cliff-l)"/>

  <!-- Small cliff piece above ramp (between Row1 hexes H5/H6 and ramp gap) -->
  <polygon points="328,65 364,57 400,65 400,81 328,81" fill="url(#cliff-l)" opacity="0.85"/>

  <!-- Stone texture on cliff faces -->
  <g stroke="#5a4530" stroke-width="0.6" opacity="0.45">
    <!-- Left section -->
    <line x1="188" y1="98" x2="260" y2="98"/>
    <line x1="186" y1="112" x2="264" y2="112"/>
    <line x1="190" y1="126" x2="258" y2="126"/>
    <line x1="260" y1="96" x2="324" y2="96"/>
    <line x1="258" y1="110" x2="326" y2="110"/>
    <line x1="262" y1="124" x2="322" y2="124"/>
    <!-- Right section -->
    <line x1="404" y1="98" x2="468" y2="98"/>
    <line x1="402" y1="112" x2="470" y2="112"/>
    <line x1="406" y1="126" x2="466" y2="126"/>
  </g>
  <!-- Vertical stone divisions -->
  <g stroke="#5a4530" stroke-width="0.5" opacity="0.3">
    <line x1="220" y1="89" x2="220" y2="144"/>
    <line x1="256" y1="81" x2="256" y2="136"/>
    <line x1="292" y1="89" x2="292" y2="144"/>
    <line x1="436" y1="89" x2="436" y2="144"/>
  </g>

  <!-- Cliff top highlight -->
  <polyline points="184,81 220,89 256,81 292,89 328,81" fill="none" stroke="#c0a070" stroke-width="1.2" opacity="0.5"/>
  <polyline points="400,81 436,89 472,81" fill="none" stroke="#c0a070" stroke-width="1.2" opacity="0.5"/>

  <!-- Cliff X marks (not passable) -->
  <g stroke="#dd4444" stroke-width="2" stroke-linecap="round" opacity="0.6">
    <line x1="232" y1="103" x2="244" y2="117"/><line x1="244" y1="103" x2="232" y2="117"/>
    <line x1="300" y1="103" x2="312" y2="117"/><line x1="312" y1="103" x2="300" y2="117"/>
    <line x1="434" y1="103" x2="446" y2="117"/><line x1="446" y1="103" x2="434" y2="117"/>
  </g>

  <!-- ====== RAMP ====== -->
  <!-- Ramp surface (fills gap between cliff sections, sloped) -->
  <polygon points="328,81 400,81 400,136 328,136" fill="url(#ramp-g)"/>
  <!-- Ramp chevrons (slope direction indicators) -->
  <g stroke="#2d5028" stroke-width="1.3" fill="none" opacity="0.45" stroke-linecap="round">
    <polyline points="340,90 364,86 388,90"/>
    <polyline points="336,100 364,95 392,100"/>
    <polyline points="334,110 364,104 394,110"/>
    <polyline points="332,120 364,114 396,120"/>
    <polyline points="330,130 364,124 398,130"/>
  </g>
  <!-- Ramp walkable arrows -->
  <polygon points="364,84 370,92 358,92" fill="#66cc55" opacity="0.5"/>
  <polygon points="364,132 370,124 358,124" fill="#66cc55" opacity="0.5"/>
  <!-- Ramp border -->
  <rect x="328" y="81" width="72" height="55" fill="none" stroke="#5a8a4a" stroke-width="1.5" rx="1"/>

  <!-- ====== HIGH GROUND HEXES ====== -->
  <g id="high-ground">
    <!-- Row 0 (y=25, back row) -->
    <polygon points="220,9 256,17 256,33 220,41 184,33 184,17" fill="#5eaa4f" stroke="#478c39" stroke-width="1.8"/>
    <polygon points="292,9 328,17 328,33 292,41 256,33 256,17" fill="#62b053" stroke="#478c39" stroke-width="1.8"/>
    <polygon points="364,9 400,17 400,33 364,41 328,33 328,17" fill="#5eaa4f" stroke="#478c39" stroke-width="1.8"/>
    <polygon points="436,9 472,17 472,33 436,41 400,33 400,17" fill="#62b053" stroke="#478c39" stroke-width="1.8"/>
    <!-- Row 1 (y=49, staggered) -->
    <polygon points="256,33 292,41 292,57 256,65 220,57 220,41" fill="#62b053" stroke="#478c39" stroke-width="1.8"/>
    <polygon points="328,33 364,41 364,57 328,65 292,57 292,41" fill="#5eaa4f" stroke="#478c39" stroke-width="1.8"/>
    <polygon points="400,33 436,41 436,57 400,65 364,57 364,41" fill="#62b053" stroke="#478c39" stroke-width="1.8"/>
    <!-- Row 2 (y=73, cliff edge — H9 removed for ramp) -->
    <polygon points="220,57 256,65 256,81 220,89 184,81 184,65" fill="#5eaa4f" stroke="#478c39" stroke-width="1.8"/>
    <polygon points="292,57 328,65 328,81 292,89 256,81 256,65" fill="#62b053" stroke="#478c39" stroke-width="1.8"/>
    <!-- gap: ramp at x=328-400 -->
    <polygon points="436,57 472,65 472,81 436,89 400,81 400,65" fill="#5eaa4f" stroke="#478c39" stroke-width="1.8"/>
  </g>

  <!-- High ground highlights (sunlight on top half) -->
  <g opacity="0.08" fill="#ffffff">
    <polygon points="220,9 256,17 256,25 220,25 184,25 184,17"/>
    <polygon points="292,9 328,17 328,25 292,25 256,25 256,17"/>
    <polygon points="364,9 400,17 400,25 364,25 328,25 328,17"/>
    <polygon points="436,9 472,17 472,25 436,25 400,25 400,17"/>
  </g>
  <!-- High ground grass -->
  <g stroke="#75c865" stroke-width="0.8" stroke-linecap="round" opacity="0.45">
    <line x1="216" y1="22" x2="219" y2="17"/><line x1="225" y1="24" x2="228" y2="19"/>
    <line x1="288" y1="22" x2="291" y2="17"/><line x1="360" y1="24" x2="363" y2="19"/>
    <line x1="432" y1="22" x2="435" y2="17"/>
    <line x1="252" y1="46" x2="255" y2="41"/><line x1="324" y1="48" x2="327" y2="43"/>
    <line x1="396" y1="46" x2="399" y2="41"/>
    <line x1="216" y1="70" x2="219" y2="65"/><line x1="288" y1="70" x2="291" y2="65"/>
  </g>

  <!-- ====== TOWER on H5 (328, 49) ====== -->
  <circle cx="328" cy="42" r="36" fill="url(#tower-glow)"/>
  <!-- Tower body (isometric) -->
  <polygon points="328,28 342,34 342,50 328,56 314,50 314,34" fill="#c8952a" stroke="#906818" stroke-width="1.2"/>
  <!-- Tower upper -->
  <rect x="322" y="20" width="12" height="15" rx="1" fill="#daa830" stroke="#906818" stroke-width="0.8"/>
  <!-- Tower roof -->
  <polygon points="328,12 337,20 319,20" fill="#e8be40" stroke="#906818" stroke-width="0.8"/>
  <!-- Window -->
  <rect x="325" y="23" width="6" height="4" rx="0.5" fill="#2a1808" opacity="0.8"/>
  <!-- Range ellipse -->
  <ellipse cx="328" cy="50" rx="120" ry="130" fill="url(#range-fill)"/>
  <ellipse cx="328" cy="50" rx="120" ry="130" fill="none" stroke="#ffdd55" stroke-width="0.8" stroke-dasharray="4,5" opacity="0.2"/>

  <!-- ====== ENEMIES on low ground ====== -->
  <g transform="translate(328, 204)">
    <circle r="9" fill="#cc3333" stroke="#882222" stroke-width="1.3"/>
    <circle r="3.5" fill="#ff6655"/>
    <ellipse cx="-7" cy="-3" rx="4.5" ry="2.5" fill="#bb2222" opacity="0.5"/>
    <ellipse cx="7" cy="-3" rx="4.5" ry="2.5" fill="#bb2222" opacity="0.5"/>
  </g>
  <g transform="translate(290, 222)">
    <circle r="7" fill="#cc3333" stroke="#882222" stroke-width="1.2"/>
    <circle r="2.8" fill="#ff6655"/>
    <ellipse cx="-5" cy="-2" rx="3.5" ry="2" fill="#bb2222" opacity="0.5"/>
    <ellipse cx="5" cy="-2" rx="3.5" ry="2" fill="#bb2222" opacity="0.5"/>
  </g>
  <g transform="translate(365, 228)">
    <circle r="7" fill="#cc3333" stroke="#882222" stroke-width="1.2"/>
    <circle r="2.8" fill="#ff6655"/>
    <ellipse cx="-5" cy="-2" rx="3.5" ry="2" fill="#bb2222" opacity="0.5"/>
    <ellipse cx="5" cy="-2" rx="3.5" ry="2" fill="#bb2222" opacity="0.5"/>
  </g>

  <!-- Enemy movement arrow toward ramp -->
  <path d="M328,192 L340,160 L352,140" fill="none" stroke="#cc4444" stroke-width="1.2" stroke-dasharray="3,4" opacity="0.45"/>
  <polygon points="354,137 348,144 356,143" fill="#cc4444" opacity="0.45"/>

  <!-- Range attack arrow (tower → enemy) -->
  <line x1="340" y1="56" x2="335" y2="192" stroke="#ffcc33" stroke-width="1.3" stroke-dasharray="5,4" opacity="0.4"/>
  <polygon points="335,195 330,187 340,187" fill="#ffcc33" opacity="0.4"/>

  <!-- ====== LABELS ====== -->
  <!-- Title -->
  <text x="328" y="298" text-anchor="middle" fill="#c8a840" font-family="sans-serif" font-size="15" font-weight="bold" letter-spacing="3">ISOMETRIC ELEVATION</text>

  <!-- High ground -->
  <g transform="translate(558, 30)">
    <rect x="-65" y="-14" width="130" height="24" rx="5" fill="#1a2e15" opacity="0.92" stroke="#478c39" stroke-width="0.5"/>
    <text text-anchor="middle" fill="#88dd66" font-family="sans-serif" font-size="12" font-weight="bold" dy="4">YUKSEK ZEMIN</text>
  </g>
  <line x1="493" y1="30" x2="475" y2="40" stroke="#88dd66" stroke-width="0.8" opacity="0.4"/>

  <!-- Low ground -->
  <g transform="translate(558, 210)">
    <rect x="-58" y="-14" width="116" height="24" rx="5" fill="#0d1a0a" opacity="0.92" stroke="#2b4d25" stroke-width="0.5"/>
    <text text-anchor="middle" fill="#5a9a4a" font-family="sans-serif" font-size="12" font-weight="bold" dy="4">ALCAK ZEMIN</text>
  </g>
  <line x1="500" y1="210" x2="475" y2="200" stroke="#5a9a4a" stroke-width="0.8" opacity="0.4"/>

  <!-- Cliff -->
  <g transform="translate(118, 110)">
    <rect x="-48" y="-13" width="96" height="22" rx="4" fill="#2a1e10" opacity="0.92" stroke="#8a7050" stroke-width="0.5"/>
    <text text-anchor="middle" fill="#c8a060" font-family="sans-serif" font-size="11" font-weight="bold" dy="3">UCURUM</text>
  </g>
  <line x1="165" y1="108" x2="186" y2="105" stroke="#c8a060" stroke-width="0.8" opacity="0.4"/>

  <!-- Ramp -->
  <g transform="translate(425, 108)">
    <rect x="-32" y="-13" width="64" height="22" rx="4" fill="#1a2e15" opacity="0.92" stroke="#5a8a4a" stroke-width="0.5"/>
    <text text-anchor="middle" fill="#66cc55" font-family="sans-serif" font-size="11" font-weight="bold" dy="3">RAMPA</text>
  </g>
  <line x1="393" y1="108" x2="402" y2="108" stroke="#66cc55" stroke-width="0.8" opacity="0.4"/>

  <!-- Tower -->
  <g transform="translate(328, 5)">
    <rect x="-20" y="-9" width="40" height="16" rx="3" fill="#2a1e0a" opacity="0.92"/>
    <text text-anchor="middle" fill="#e8be40" font-family="sans-serif" font-size="9" font-weight="bold" dy="3">KULE</text>
  </g>

  <!-- Gecilemez labels -->
  <text x="238" y="96" text-anchor="middle" fill="#dd4444" font-family="sans-serif" font-size="7" font-weight="bold" opacity="0.6">GECILEMEZ</text>
  <text x="440" y="96" text-anchor="middle" fill="#dd4444" font-family="sans-serif" font-size="7" font-weight="bold" opacity="0.6">GECILEMEZ</text>

  <!-- Range bonus -->
  <g transform="translate(580, 118)">
    <rect x="-80" y="-26" width="160" height="50" rx="6" fill="#1a1608" opacity="0.92" stroke="#ffcc33" stroke-width="0.4" stroke-opacity="0.3"/>
    <text text-anchor="middle" fill="#ffcc33" font-family="sans-serif" font-size="12" font-weight="bold" dy="-6">MENZIL AVANTAJI</text>
    <text text-anchor="middle" fill="#bb9933" font-family="sans-serif" font-size="9" dy="10">Yuksek zemin = +menzil</text>
    <text text-anchor="middle" fill="#bb9933" font-family="sans-serif" font-size="9" dy="22">Alcak zemine ates edebilir</text>
  </g>

  <!-- ====== CROSS-SECTION (bottom-right) ====== -->
  <g transform="translate(560, 310)">
    <rect x="-15" y="-14" width="195" height="115" rx="6" fill="#090e07" opacity="0.9" stroke="#444" stroke-width="0.5"/>
    <text x="82" y="2" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="9" font-weight="bold">YANDAN GORUNUM</text>
    <!-- High platform -->
    <rect x="10" y="18" width="65" height="10" rx="2" fill="#5eaa4f" stroke="#478c39" stroke-width="1"/>
    <!-- Cliff -->
    <rect x="10" y="28" width="65" height="40" fill="#7a6545" stroke="#5a4530" stroke-width="0.5"/>
    <!-- Stone lines -->
    <line x1="14" y1="38" x2="72" y2="38" stroke="#5a4530" stroke-width="0.5" opacity="0.6"/>
    <line x1="14" y1="48" x2="72" y2="48" stroke="#5a4530" stroke-width="0.5" opacity="0.6"/>
    <line x1="14" y1="58" x2="72" y2="58" stroke="#5a4530" stroke-width="0.5" opacity="0.6"/>
    <!-- Low ground -->
    <rect x="10" y="68" width="160" height="10" rx="2" fill="#3a6432" stroke="#2b4d25" stroke-width="1"/>
    <!-- Ramp slope -->
    <polygon points="75,28 110,68 75,68" fill="#4a8a3e" stroke="#3a6a30" stroke-width="0.8"/>
    <!-- Labels -->
    <text x="42" y="14" text-anchor="middle" fill="#88dd66" font-family="sans-serif" font-size="7">Yuksek</text>
    <text x="140" y="66" text-anchor="middle" fill="#5a9a4a" font-family="sans-serif" font-size="7">Alcak</text>
    <text x="90" y="46" fill="#7a9a55" font-family="sans-serif" font-size="7" transform="rotate(38,90,46)">Rampa</text>
    <!-- Height arrow -->
    <line x1="4" y1="22" x2="4" y2="74" stroke="#999" stroke-width="0.7"/>
    <polygon points="4,19 2,24 6,24" fill="#999"/>
    <polygon points="4,77 2,72 6,72" fill="#999"/>
    <!-- Tower -->
    <polygon points="38,13 42,18 34,18" fill="#e8be40"/>
    <rect x="36" y="8" width="4" height="6" fill="#daa830"/>
    <!-- Enemy -->
    <circle cx="140" cy="65" r="4" fill="#cc3333"/>
    <!-- Arrow showing attack downward -->
    <line x1="42" y1="16" x2="130" y2="62" stroke="#ffcc33" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.5"/>
    <polygon points="132,63 126,58 130,66" fill="#ffcc33" opacity="0.5"/>
  </g>

  <!-- ====== LEGEND (bottom-left) ====== -->
  <g transform="translate(30, 318)">
    <rect x="-12" y="-14" width="210" height="100" rx="6" fill="#090e07" opacity="0.9" stroke="#444" stroke-width="0.5"/>
    <!-- High ground -->
    <polygon points="10,4 22,8 22,16 10,20 -2,16 -2,8" fill="#5eaa4f" stroke="#478c39" stroke-width="1"/>
    <text x="30" y="16" fill="#aaa" font-family="sans-serif" font-size="9">Yuksek Zemin (elevation 1)</text>
    <!-- Low ground -->
    <polygon points="10,30 22,34 22,42 10,46 -2,42 -2,34" fill="#3a6432" stroke="#2b4d25" stroke-width="1"/>
    <text x="30" y="42" fill="#aaa" font-family="sans-serif" font-size="9">Alcak Zemin (elevation 0)</text>
    <!-- Cliff -->
    <rect x="2" y="54" width="16" height="10" rx="1" fill="#7a6545" stroke="#5a4530" stroke-width="0.5"/>
    <text x="30" y="64" fill="#aaa" font-family="sans-serif" font-size="9">Ucurum Duvari (gecilemez)</text>
    <!-- Ramp -->
    <rect x="2" y="72" width="16" height="10" rx="1" fill="url(#ramp-g)"/>
    <text x="30" y="82" fill="#aaa" font-family="sans-serif" font-size="9">Rampa (tek gecis noktasi)</text>
  </g>
</svg>
