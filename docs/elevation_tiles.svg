<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580">
  <defs>
    <linearGradient id="cliff-right" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#a88c5c"/><stop offset="100%" stop-color="#7a6842"/>
    </linearGradient>
    <linearGradient id="cliff-left" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#806540"/><stop offset="100%" stop-color="#54432a"/>
    </linearGradient>
    <linearGradient id="ramp-fill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5eaa4f"/><stop offset="100%" stop-color="#3a6432"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="580" fill="#0e150a"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" fill="#c8a840" font-family="sans-serif"
        font-size="16" font-weight="bold" letter-spacing="2">ELEVATION TILE KATALOGU</text>
  <text x="400" y="46" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="10">
    Her tile hex grid'e oturur — cliff yuzleri hexin asagi uzantisi olarak cizilir</text>

  <!-- ================================================================ -->
  <!--  TILE 1: LOW (Alcak Zemin)                                       -->
  <!-- ================================================================ -->
  <g transform="translate(100, 130)">
    <!-- Grid cell reference (faint outline) -->
    <polygon points="0,-20 44,-10 44,10 0,20 -44,10 -44,-10"
             fill="none" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3"/>
    <!-- Hex top face -->
    <polygon points="0,-20 44,-10 44,10 0,20 -44,10 -44,-10"
             fill="#3a6432" stroke="#2b4d25" stroke-width="2"/>
    <!-- Subtle surface detail -->
    <line x1="-15" y1="-2" x2="-10" y2="-8" stroke="#4a7a42" stroke-width="0.8" opacity="0.4"/>
    <line x1="12" y1="4" x2="16" y2="-2" stroke="#4a7a42" stroke-width="0.8" opacity="0.4"/>
    <!-- Label -->
    <text x="0" y="42" text-anchor="middle" fill="#5a9a4a" font-family="sans-serif"
          font-size="12" font-weight="bold">ALCAK</text>
    <text x="0" y="55" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">elevation 0</text>
  </g>

  <!-- ================================================================ -->
  <!--  TILE 2: HIGH (Yuksek Zemin — tum kenarlar yukarida)             -->
  <!-- ================================================================ -->
  <g transform="translate(270, 130)">
    <!-- Grid cell reference -->
    <polygon points="0,-20 44,-10 44,10 0,20 -44,10 -44,-10"
             fill="none" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3"/>
    <!-- Right side face (sun-lit) -->
    <polygon points="44,-42 0,-32 0,20 44,10" fill="url(#cliff-right)"/>
    <!-- Left side face (shadow) -->
    <polygon points="0,-32 -44,-42 -44,10 0,20" fill="url(#cliff-left)"/>
    <!-- Top face (elevated) -->
    <polygon points="0,-52 44,-42 44,-22 0,-12 -44,-22 -44,-42"
             fill="#5eaa4f" stroke="#478c39" stroke-width="2"/>
    <!-- Highlight -->
    <polygon points="0,-52 44,-42 44,-32 0,-32 -44,-32 -44,-42" fill="#fff" opacity="0.06"/>
    <!-- Grass -->
    <line x1="-12" y1="-36" x2="-9" y2="-42" stroke="#75c865" stroke-width="0.8" opacity="0.4"/>
    <line x1="10" y1="-30" x2="13" y2="-36" stroke="#75c865" stroke-width="0.8" opacity="0.4"/>
    <!-- Height indicator arrow -->
    <line x1="54" y1="-42" x2="54" y2="10" stroke="#aaa" stroke-width="0.6"/>
    <polygon points="54,-45 52,-40 56,-40" fill="#aaa"/>
    <polygon points="54,13 52,8 56,8" fill="#aaa"/>
    <text x="62" y="-14" fill="#999" font-family="sans-serif" font-size="7">32px</text>
    <!-- Label -->
    <text x="0" y="42" text-anchor="middle" fill="#88dd66" font-family="sans-serif"
          font-size="12" font-weight="bold">YUKSEK</text>
    <text x="0" y="55" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">elevation 1 (tum kenarlar)</text>
  </g>

  <!-- ================================================================ -->
  <!--  TILE 3: CLIFF-SOUTH (on kenar ucurum)                          -->
  <!-- ================================================================ -->
  <g transform="translate(450, 130)">
    <!-- Grid cell reference -->
    <polygon points="0,-20 44,-10 44,10 0,20 -44,10 -44,-10"
             fill="none" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3"/>
    <!-- South-right cliff face (viewer facing, brighter) -->
    <polygon points="44,-22 0,-12 0,20 44,10" fill="url(#cliff-right)"/>
    <!-- South-left cliff face (shadow side) -->
    <polygon points="0,-12 -44,-22 -44,10 0,20" fill="url(#cliff-left)"/>
    <!-- Stone texture -->
    <line x1="2" y1="0" x2="40" y2="-8" stroke="#6a5538" stroke-width="0.5" opacity="0.5"/>
    <line x1="-38" y1="-10" x2="-2" y2="-2" stroke="#5a4530" stroke-width="0.5" opacity="0.4"/>
    <line x1="5" y1="10" x2="38" y2="2" stroke="#6a5538" stroke-width="0.5" opacity="0.4"/>
    <line x1="-35" y1="0" x2="-5" y2="8" stroke="#5a4530" stroke-width="0.5" opacity="0.3"/>
    <!-- Top face (elevated, only south edges have cliff) -->
    <polygon points="0,-52 44,-42 44,-22 0,-12 -44,-22 -44,-42"
             fill="#5eaa4f" stroke="#478c39" stroke-width="2"/>
    <!-- Cliff top edge highlight -->
    <polyline points="44,-22 0,-12 -44,-22" fill="none" stroke="#c0a070" stroke-width="1" opacity="0.5"/>
    <!-- Label -->
    <text x="0" y="42" text-anchor="middle" fill="#c8a060" font-family="sans-serif"
          font-size="12" font-weight="bold">CLIFF-S</text>
    <text x="0" y="55" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">on kenar ucurum</text>
  </g>

  <!-- ================================================================ -->
  <!--  TILE 4: RAMP (rampa — gecis tile'i)                            -->
  <!-- ================================================================ -->
  <g transform="translate(630, 130)">
    <!-- Grid cell reference -->
    <polygon points="0,-20 44,-10 44,10 0,20 -44,10 -44,-10"
             fill="none" stroke="#333" stroke-width="0.5" stroke-dasharray="3,3"/>
    <!-- Ramp surface (top = high level, bottom = low level) -->
    <!-- Distorted hex: top vertices elevated, bottom vertices at base -->
    <polygon points="0,-52 44,-42 44,10 0,20 -44,10 -44,-42"
             fill="url(#ramp-fill)" stroke="#5a8a4a" stroke-width="2"/>
    <!-- Slope chevrons -->
    <g stroke="#2d5028" stroke-width="1.2" fill="none" opacity="0.5" stroke-linecap="round">
      <polyline points="-25,-34 0,-38 25,-34"/>
      <polyline points="-30,-22 0,-27 30,-22"/>
      <polyline points="-34,-8 0,-14 34,-8"/>
      <polyline points="-36,5 0,0 36,5"/>
    </g>
    <!-- Direction arrows -->
    <polygon points="0,-46 6,-38 -6,-38" fill="#66cc55" opacity="0.5"/>
    <polygon points="0,14 6,6 -6,6" fill="#66cc55" opacity="0.5"/>
    <!-- Label -->
    <text x="0" y="42" text-anchor="middle" fill="#66cc55" font-family="sans-serif"
          font-size="12" font-weight="bold">RAMPA</text>
    <text x="0" y="55" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="9">gecis tile'i (egimli)</text>
  </g>

  <!-- ================================================================ -->
  <!--  ASSEMBLY EXAMPLE — tiles together in a hex grid                 -->
  <!-- ================================================================ -->
  <line x1="50" y1="215" x2="750" y2="215" stroke="#333" stroke-width="0.5"/>
  <text x="400" y="240" text-anchor="middle" fill="#c8a840" font-family="sans-serif"
        font-size="14" font-weight="bold" letter-spacing="1">BIRLIKTE KULLANIM</text>

  <g transform="translate(300, 390)">
    <!-- === ROW 0: HIGH ground (3 hexes, elevated) === -->
    <!-- H0 (-88, -72) elevated -->
    <g transform="translate(-88, -72)">
      <polygon points="44,-42 0,-32 0,20 44,10" fill="url(#cliff-right)" opacity="0.3"/>
      <polygon points="0,-32 -44,-42 -44,10 0,20" fill="url(#cliff-left)" opacity="0.3"/>
      <polygon points="0,-52 44,-42 44,-22 0,-12 -44,-22 -44,-42" fill="#5eaa4f" stroke="#478c39" stroke-width="1.5"/>
      <polygon points="0,-52 44,-42 44,-32 0,-32 -44,-32 -44,-42" fill="#fff" opacity="0.05"/>
    </g>
    <!-- H1 (0, -72) elevated -->
    <g transform="translate(0, -72)">
      <polygon points="44,-42 0,-32 0,20 44,10" fill="url(#cliff-right)" opacity="0.3"/>
      <polygon points="0,-32 -44,-42 -44,10 0,20" fill="url(#cliff-left)" opacity="0.3"/>
      <polygon points="0,-52 44,-42 44,-22 0,-12 -44,-22 -44,-42" fill="#62b053" stroke="#478c39" stroke-width="1.5"/>
      <polygon points="0,-52 44,-42 44,-32 0,-32 -44,-32 -44,-42" fill="#fff" opacity="0.05"/>
    </g>
    <!-- H2 (88, -72) elevated -->
    <g transform="translate(88, -72)">
      <polygon points="44,-42 0,-32 0,20 44,10" fill="url(#cliff-right)" opacity="0.3"/>
      <polygon points="0,-32 -44,-42 -44,10 0,20" fill="url(#cliff-left)" opacity="0.3"/>
      <polygon points="0,-52 44,-42 44,-22 0,-12 -44,-22 -44,-42" fill="#5eaa4f" stroke="#478c39" stroke-width="1.5"/>
      <polygon points="0,-52 44,-42 44,-32 0,-32 -44,-32 -44,-42" fill="#fff" opacity="0.05"/>
    </g>

    <!-- === ROW 1: CLIFF + RAMP (transition, staggered) === -->
    <!-- Cliff left (-44, -36) — south-facing cliff -->
    <g transform="translate(-44, -36)">
      <polygon points="44,-22 0,-12 0,20 44,10" fill="url(#cliff-right)"/>
      <polygon points="0,-12 -44,-22 -44,10 0,20" fill="url(#cliff-left)"/>
      <line x1="2" y1="0" x2="40" y2="-8" stroke="#6a5538" stroke-width="0.4" opacity="0.4"/>
      <line x1="-38" y1="-10" x2="-2" y2="-2" stroke="#5a4530" stroke-width="0.4" opacity="0.3"/>
      <line x1="5" y1="10" x2="38" y2="2" stroke="#6a5538" stroke-width="0.4" opacity="0.3"/>
      <polyline points="44,-22 0,-12 -44,-22" fill="none" stroke="#c0a070" stroke-width="0.8" opacity="0.4"/>
      <polygon points="0,-52 44,-42 44,-22 0,-12 -44,-22 -44,-42" fill="#5eaa4f" stroke="#478c39" stroke-width="1.5"/>
      <!-- X mark -->
      <line x1="-8" y1="-2" x2="8" y2="12" stroke="#dd4444" stroke-width="1.5" opacity="0.5"/>
      <line x1="8" y1="-2" x2="-8" y2="12" stroke="#dd4444" stroke-width="1.5" opacity="0.5"/>
    </g>

    <!-- RAMP (44, -36) — transitional slope -->
    <g transform="translate(44, -36)">
      <polygon points="0,-52 44,-42 44,10 0,20 -44,10 -44,-42" fill="url(#ramp-fill)" stroke="#5a8a4a" stroke-width="1.5"/>
      <g stroke="#2d5028" stroke-width="1" fill="none" opacity="0.4" stroke-linecap="round">
        <polyline points="-22,-32 0,-36 22,-32"/>
        <polyline points="-28,-18 0,-24 28,-18"/>
        <polyline points="-32,-4 0,-10 32,-4"/>
        <polyline points="-34,8 0,2 34,8"/>
      </g>
      <polygon points="0,-44 5,-36 -5,-36" fill="#66cc55" opacity="0.4"/>
      <polygon points="0,14 5,6 -5,6" fill="#66cc55" opacity="0.4"/>
    </g>

    <!-- === ROW 2: LOW ground (3 hexes) === -->
    <!-- L0 (-88, 0) -->
    <polygon points="-88,-20 -44,-10 -44,10 -88,20 -132,10 -132,-10"
             fill="#3a6432" stroke="#2b4d25" stroke-width="1.5"/>
    <!-- L1 (0, 0) -->
    <polygon points="0,-20 44,-10 44,10 0,20 -44,10 -44,-10"
             fill="#3d6835" stroke="#2b4d25" stroke-width="1.5"/>
    <!-- L2 (88, 0) -->
    <polygon points="88,-20 132,-10 132,10 88,20 44,10 44,-10"
             fill="#3a6432" stroke="#2b4d25" stroke-width="1.5"/>

    <!-- === ROW 3: More LOW (staggered) === -->
    <polygon points="-44,16 0,26 0,46 -44,56 -88,46 -88,26"
             fill="#3d6835" stroke="#2b4d25" stroke-width="1.5"/>
    <polygon points="44,16 88,26 88,46 44,56 0,46 0,26"
             fill="#3a6432" stroke="#2b4d25" stroke-width="1.5"/>

    <!-- === GAME ELEMENTS === -->
    <!-- Tower on high ground H1 -->
    <g transform="translate(0, -124)">
      <circle r="22" fill="url(#tower-glow)" opacity="0.7"/>
      <polygon points="0,-18 10,-12 10,0 0,6 -10,0 -10,-12" fill="#c8952a" stroke="#906818" stroke-width="1"/>
      <rect x="-4" y="-24" width="8" height="10" rx="1" fill="#daa830" stroke="#906818" stroke-width="0.6"/>
      <polygon points="0,-30 6,-24 -6,-24" fill="#e8be40"/>
    </g>

    <!-- Enemy on low ground L1 -->
    <g transform="translate(0, 0)">
      <circle r="7" fill="#cc3333" stroke="#882222" stroke-width="1"/>
      <circle r="2.5" fill="#ff6655"/>
    </g>
    <g transform="translate(44, 36)">
      <circle r="6" fill="#cc3333" stroke="#882222" stroke-width="1"/>
      <circle r="2" fill="#ff6655"/>
    </g>

    <!-- Range attack line -->
    <line x1="6" y1="-112" x2="2" y2="-8" stroke="#ffcc33" stroke-width="1" stroke-dasharray="4,4" opacity="0.3"/>

    <!-- Labels for assembly -->
    <text x="-170" y="-100" fill="#88dd66" font-family="sans-serif" font-size="9" font-weight="bold">YUKSEK</text>
    <text x="-170" y="-88" fill="#88dd66" font-family="sans-serif" font-size="9" font-weight="bold">ZEMIN</text>

    <text x="-170" y="-20" fill="#c8a060" font-family="sans-serif" font-size="9" font-weight="bold">UCURUM</text>
    <text x="-170" y="-8" fill="#c8a060" font-family="sans-serif" font-size="9" font-weight="bold">KENARI</text>

    <text x="-170" y="20" fill="#5a9a4a" font-family="sans-serif" font-size="9" font-weight="bold">ALCAK</text>
    <text x="-170" y="32" fill="#5a9a4a" font-family="sans-serif" font-size="9" font-weight="bold">ZEMIN</text>

    <text x="110" y="-30" fill="#66cc55" font-family="sans-serif" font-size="9" font-weight="bold">RAMPA</text>
    <line x1="108" y1="-28" x2="82" y2="-28" stroke="#66cc55" stroke-width="0.6" opacity="0.4"/>
  </g>

  <!-- ================================================================ -->
  <!--  CONCEPT EXPLANATION (right side)                                -->
  <!-- ================================================================ -->
  <g transform="translate(620, 340)">
    <rect x="-12" y="-14" width="175" height="145" rx="6" fill="#090e07" opacity="0.9" stroke="#444" stroke-width="0.5"/>
    <text x="75" y="2" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="10" font-weight="bold">NASIL CALISIYOR</text>

    <!-- Mini hex diagram -->
    <!-- Normal hex footprint (dashed) -->
    <polygon points="75,28 105,36 105,56 75,66 45,56 45,36" fill="none" stroke="#555" stroke-width="0.8" stroke-dasharray="2,2"/>
    <text x="75" y="80" text-anchor="middle" fill="#666" font-family="sans-serif" font-size="7">hex alani (grid)</text>

    <!-- Elevated top -->
    <polygon points="105,18 75,26 75,66 105,56" fill="url(#cliff-right)" opacity="0.8"/>
    <polygon points="75,26 45,18 45,56 75,66" fill="url(#cliff-left)" opacity="0.8"/>
    <polygon points="75,8 105,18 105,36 75,46 45,36 45,18" fill="#5eaa4f" stroke="#478c39" stroke-width="1"/>

    <!-- Arrow showing "extension downward" -->
    <line x1="115" y1="18" x2="115" y2="56" stroke="#c8a060" stroke-width="0.6"/>
    <polygon points="115,15 113,20 117,20" fill="#c8a060"/>
    <polygon points="115,59 113,54 117,54" fill="#c8a060"/>
    <text x="125" y="38" fill="#c8a060" font-family="sans-serif" font-size="7">cliff</text>
    <text x="125" y="46" fill="#c8a060" font-family="sans-serif" font-size="7">uzanti</text>

    <!-- Explanation text -->
    <text x="8" y="98" fill="#999" font-family="sans-serif" font-size="8">Ust yuz = yuksek zemin</text>
    <text x="8" y="110" fill="#999" font-family="sans-serif" font-size="8">Yan yuz = ucurum duvari</text>
    <text x="8" y="122" fill="#999" font-family="sans-serif" font-size="8">Taban = hex grid hizasi</text>
  </g>

  <!-- Legend bottom -->
  <g transform="translate(50, 520)">
    <rect x="-8" y="-16" width="350" height="28" rx="4" fill="#090e07" opacity="0.8"/>
    <polygon points="10,-4 24,0 24,8 10,12 -4,8 -4,0" fill="#5eaa4f" stroke="#478c39" stroke-width="0.8"/>
    <text x="32" y="7" fill="#888" font-family="sans-serif" font-size="9">Yuksek</text>
    <polygon points="90,-4 104,0 104,8 90,12 76,8 76,0" fill="#3a6432" stroke="#2b4d25" stroke-width="0.8"/>
    <text x="112" y="7" fill="#888" font-family="sans-serif" font-size="9">Alcak</text>
    <rect x="155" y="-2" width="14" height="10" rx="1" fill="#8a6d48"/>
    <text x="177" y="7" fill="#888" font-family="sans-serif" font-size="9">Ucurum</text>
    <rect x="225" y="-2" width="14" height="10" rx="1" fill="url(#ramp-fill)"/>
    <text x="247" y="7" fill="#888" font-family="sans-serif" font-size="9">Rampa</text>
    <line x1="293" y1="-2" x2="306" y2="8" stroke="#dd4444" stroke-width="1.5"/>
    <line x1="306" y1="-2" x2="293" y2="8" stroke="#dd4444" stroke-width="1.5"/>
    <text x="314" y="7" fill="#888" font-family="sans-serif" font-size="9">Gecilemez</text>
  </g>
</svg>
